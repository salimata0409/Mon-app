<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌿 Mon espace puissant</title>

<style>
body{
font-family:Arial;
background:#0c0a14;
color:white;
padding:20px;
text-align:center;
}

.card{
background:#1e1b2e;
padding:20px;
border-radius:20px;
margin:15px 0;
}

button{
background:#7b5cff;
border:none;
padding:10px 20px;
border-radius:10px;
color:white;
margin-top:10px;
}

textarea{
width:100%;
height:100px;
border-radius:10px;
padding:10px;
}

input{
padding:10px;
border-radius:10px;
border:none;
width:80%;
}

</style>
</head>

<body>

<h1>🌿 Mon espace transformation</h1>

<div class="card">
<h2>🔥 Humeur du jour</h2>
<input id="humeur" placeholder="Comment tu te sens ?">
<button onclick="saveHumeur()">Sauver</button>
</div>

<div class="card">
<h2>🧠 Journal</h2>
<textarea id="note"></textarea>
<button onclick="save()">Sauvegarder</button>
</div>

<div class="card">
<h2>💪 Discipline</h2>
<p id="count">0 jours clean</p>
<button onclick="addDay()">+1 jour</button>
</div>

<div class="card">
<h2>🚨 Mode urgence</h2>
<button onclick="urgence()">STOP</button>
</div>

<script>

function save(){
let note=document.getElementById("note").value;
localStorage.setItem("note",note);
alert("Sauvegardé");
}

function saveHumeur(){
let humeur=document.getElementById("humeur").value;
localStorage.setItem("humeur",humeur);
alert("Noté");
}

function addDay(){
let count=localStorage.getItem("count")||0;
count++;
localStorage.setItem("count",count);
document.getElementById("count").innerText=count+" jours clean";
}

function urgence(){
alert("Respire. Tu contrôles. Tu es plus forte que ton impulsion.");
}

window.onload=function(){
document.getElementById("note").value=localStorage.getItem("note")||"";
document.getElementById("humeur").value=localStorage.getItem("humeur")||"";
document.getElementById("count").innerText=(localStorage.getItem("count")||0)+" jours clean";
}

</script>

</body>
</html>
