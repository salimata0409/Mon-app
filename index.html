<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calme & recentrage</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0c0a14;
color:white;
}

header{
padding:20px;
text-align:center;
background:linear-gradient(135deg,#7b5cff,#c9a7ff);
}

.container{
padding:15px;
}

.card{
background:#1e1b2e;
padding:15px;
margin:10px 0;
border-radius:15px;
}

h2{
margin-top:0;
}

input, textarea{
width:100%;
padding:10px;
border-radius:10px;
border:none;
margin-top:10px;
}

button{
margin-top:10px;
padding:10px;
border:none;
border-radius:10px;
background:#7b5cff;
color:white;
width:100%;
}

.nav{
position:fixed;
bottom:0;
width:100%;
display:flex;
background:#1e1b2e;
}

.nav button{
flex:1;
background:none;
color:white;
}

.section{
display:none;
}

.active{
display:block;
}
</style>
</head>

<body>

<header>
<h1>🌿 Calme & recentrage</h1>
<p>Ton espace personnel</p>
</header>

<div class="container">

<div id="home" class="section active">
<div class="card">
<h2>Humeur</h2>
<input id="humeur">
<button onclick="saveHumeur()">Enregistrer</button>
</div>

<div class="card">
<h2>Journal</h2>
<textarea id="journal"></textarea>
<button onclick="saveJournal()">Sauvegarder</button>
</div>

<div class="card">
<h2>Discipline</h2>
<p id="count">0 jours clean</p>
<button onclick="addDay()">+1 jour</button>
</div>
</div>

<div id="journalPage" class="section">
<div class="card">
<h2>Notes</h2>
<textarea id="note"></textarea>
<button onclick="saveNote()">Sauvegarder</button>
</div>
</div>

<div id="stats" class="section">
<div class="card">
<h2>Stats</h2>
<p id="statText"></p>
</div>
</div>

</div>

<div class="nav">
<button onclick="show('home')">Accueil</button>
<button onclick="show('journalPage')">Journal</button>
<button onclick="show('stats')">Stats</button>
</div>

<script>

function show(id){
document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

function saveHumeur(){
localStorage.setItem("humeur",document.getElementById("humeur").value);
alert("Enregistré");
}

function saveJournal(){
localStorage.setItem("journal",document.getElementById("journal").value);
alert("Sauvegardé");
}

function saveNote(){
localStorage.setItem("note",document.getElementById("note").value);
alert("Ok");
}

function addDay(){
let c=localStorage.getItem("count")||0;
c++;
localStorage.setItem("count",c);
document.getElementById("count").innerText=c+" jours clean";
updateStats();
}

function updateStats(){
let c=localStorage.getItem("count")||0;
document.getElementById("statText").innerText="Tu avances depuis "+c+" jours 🔥";
}

window.onload=function(){
document.getElementById("humeur").value=localStorage.getItem("humeur")||"";
document.getElementById("journal").value=localStorage.getItem("journal")||"";
document.getElementById("note").value=localStorage.getItem("note")||"";
document.getElementById("count").innerText=(localStorage.getItem("count")||0)+" jours clean";
updateStats();
}

</script>

</body>
</
